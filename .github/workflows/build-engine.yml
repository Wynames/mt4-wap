# file: .github/workflows/build-engine.yml
name: Build APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName }}
      TARGET_URL: ${{ github.event.client_payload.targetUrl }}
      PACKAGE_NAME: ${{ github.event.client_payload.packageName }}
      PROJECT_ID: ${{ github.event.client_payload.projectId }}
      CONFIG: ${{ toJson(github.event.client_payload.config) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Replace placeholders
        run: |
          sed -i "s/com\.template\.webview/$PACKAGE_NAME/g" android-template/app/build.gradle
          sed -i "s/com\.template\.webview/$PACKAGE_NAME/g" android-template/app/src/main/AndroidManifest.xml
          sed -i "s/com\.template\.webview/$PACKAGE_NAME/g" android-template/app/src/main/java/com/template/webview/MainActivity.kt
          sed -i "s/Template App/$APP_NAME/g" android-template/app/src/main/res/values/strings.xml
          sed -i "s|__TARGET_URL__|$TARGET_URL|g" android-template/app/src/main/java/com/template/webview/MainActivity.kt
          rm -f android-template/app/src/main/res/mipmap/ic_launcher.png
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' android-template/app/src/main/AndroidManifest.xml

      - name: Build Release APK
        run: |
          cd android-template
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleRelease

      - name: Upload APK and notify webhook
        run: |
          APK_FILE=$(ls android-template/app/build/outputs/apk/release/*.apk | head -1)
          RESPONSE=$(curl -s -F "file=@$APK_FILE" https://tmpfiles.org/api/v1/upload)
          RAW_URL=$(echo $RESPONSE | jq -r .data.url)
          DOWNLOAD_URL="${RAW_URL/tmpfiles.org\//tmpfiles.org\/dl\/}"
          echo "Download URL: $DOWNLOAD_URL"
          curl -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"project_id\": \"$PROJECT_ID\", \"status\": \"success\", \"download_url\": \"$DOWNLOAD_URL\"}"
        env:
          WEBHOOK_URL: ${{ github.event.client_payload.webhookUrl }}

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.PROJECT_ID }}
          path: android-template/app/build/outputs/apk/release/*.apk
