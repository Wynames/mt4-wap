# file: .github/workflows/build-engine.yml
name: Build APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName }}
      TARGET_URL: ${{ github.event.client_payload.targetUrl }}
      PACKAGE_NAME: ${{ github.event.client_payload.packageName }}
      PROJECT_ID: ${{ github.event.client_payload.projectId }}
      CONFIG: ${{ toJson(github.event.client_payload.config) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Replace placeholders
        run: |
          sed -i "s/com\.template\.webview/$PACKAGE_NAME/g" android-template/app/build.gradle
          sed -i "s/com\.template\.webview/$PACKAGE_NAME/g" android-template/app/src/main/AndroidManifest.xml
          sed -i "s/com\.template\.webview/$PACKAGE_NAME/g" android-template/app/src/main/java/com/template/webview/MainActivity.kt
          sed -i "s/Template App/$APP_NAME/g" android-template/app/src/main/res/values/strings.xml
          sed -i "s|__TARGET_URL__|$TARGET_URL|g" android-template/app/src/main/java/com/template/webview/MainActivity.kt
          rm -f android-template/app/src/main/res/mipmap/ic_launcher.png
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' android-template/app/src/main/AndroidManifest.xml

      - name: Inject watermark configuration
        run: |
          WM_TYPE=$(echo '${{ env.CONFIG }}' | jq -r '.watermark.watermark_type // "text"')
          WM_TEXT=$(echo '${{ env.CONFIG }}' | jq -r '.watermark.watermark_text // "Created via Our Builder"')
          WM_IMAGE_URL=$(echo '${{ env.CONFIG }}' | jq -r '.watermark.watermark_image_url // ""')
          WM_OPACITY=$(echo '${{ env.CONFIG }}' | jq -r '.watermark.watermark_opacity // "0.8"')
          WM_SIZE=$(echo '${{ env.CONFIG }}' | jq -r '.watermark.watermark_size // "14"')

          # Build a new injectWatermark function using dynamic values
          NEW_METHOD="
              private fun injectWatermark() {
                  val wmType = \"${WM_TYPE}\"
                  val wmText = \"${WM_TEXT}\"
                  val wmImageUrl = \"${WM_IMAGE_URL}\"
                  val wmOpacity = ${WM_OPACITY}
                  val wmSize = ${WM_SIZE}
                  val js = if (wmType == \"text\") {
                      \"\"\"
                          (function() {
                              var existing = document.getElementById('xt4-watermark');
                              if (existing) existing.remove();
                              var div = document.createElement('div');
                              div.id = 'xt4-watermark';
                              div.innerHTML = '\$wmText';
                              div.style.position = 'fixed';
                              div.style.bottom = '0';
                              div.style.left = '0';
                              div.style.width = '100%';
                              div.style.opacity = '\$wmOpacity';
                              div.style.fontSize = '\${wmSize}px';
                              div.style.backgroundColor = 'rgba(0,0,0,0.8)';
                              div.style.color = '#ffffff';
                              div.style.textAlign = 'center';
                              div.style.padding = '8px';
                              div.style.zIndex = '999999';
                              div.style.fontFamily = 'sans-serif';
                              document.body.appendChild(div);
                          })();
                      \"\"\"
                  } else {
                      \"\"\"
                          (function() {
                              var existing = document.getElementById('xt4-watermark');
                              if (existing) existing.remove();
                              var img = document.createElement('img');
                              img.id = 'xt4-watermark';
                              img.src = '\$wmImageUrl';
                              img.style.position = 'fixed';
                              img.style.bottom = '0';
                              img.style.right = '0';
                              img.style.width = '\${wmSize * 2}px';
                              img.style.opacity = '\$wmOpacity';
                              img.style.zIndex = '999999';
                              document.body.appendChild(img);
                          })();
                      \"\"\"
                  }
                  webView.evaluateJavascript(js, null)
              }
          "
          # Escape newlines for sed
          ESCAPED_METHOD=$(echo "$NEW_METHOD" | sed -z 's/\n/\\n/g')
          # Replace the whole injectWatermark function in MainActivity.kt
          sed -i "/private fun injectWatermark()/,/^    }$/c\\$ESCAPED_METHOD" android-template/app/src/main/java/com/template/webview/MainActivity.kt

      - name: Build Release APK
        run: |
          cd android-template
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleRelease

      - name: Sign APK with temporary keystore
        run: |
          keytool -genkey -v -keystore temp.keystore -alias temp -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, S=Temp, C=US"
          UNSIGNED_APK=$(ls android-template/app/build/outputs/apk/release/*.apk | head -1)
          SIGNED_APK="app-release-signed.apk"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --v1-signing-enabled true --v2-signing-enabled true --ks temp.keystore --ks-pass pass:android --key-pass pass:android --out $SIGNED_APK $UNSIGNED_APK
          mv $SIGNED_APK android-template/app/build/outputs/apk/release/

      - name: Upload APK and notify webhook
        run: |
          APK_FILE=$(ls android-template/app/build/outputs/apk/release/*-signed.apk | head -1)
          RESPONSE=$(curl -s -F "file=@$APK_FILE" https://tmpfiles.org/api/v1/upload)
          RAW_URL=$(echo $RESPONSE | jq -r .data.url)
          DOWNLOAD_URL="${RAW_URL/tmpfiles.org\//tmpfiles.org\/dl\/}"
          echo "Download URL: $DOWNLOAD_URL"
          curl -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"project_id\": \"$PROJECT_ID\", \"status\": \"completed\", \"download_url\": \"$DOWNLOAD_URL\"}"
        env:
          WEBHOOK_URL: ${{ github.event.client_payload.webhookUrl }}

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.PROJECT_ID }}
          path: android-template/app/build/outputs/apk/release/*-signed.apk
